services:
  db:
    image: postgres:15-alpine
    container_name: gv_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gv
    restart: unless-stopped

  gv-api:
    build: .
    container_name: gv_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - gv
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  gv:
    external: true
